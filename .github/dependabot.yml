version: 2
updates:
  # pnpm workspace dependencies (reads pnpm-lock.yaml + workspace package.json)
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    ignore:
      # Pin @types/node to the runtime major (Node 24 LTS); block major bumps ahead of it
      - dependency-name: "@types/node"
        update-types: ["version-update:semver-major"]
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch

  # Keep the GitHub Actions used in workflows up to date
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        update-types:
          - minor
          - patch
